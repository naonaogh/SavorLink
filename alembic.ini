# alembic.ini — конфигурация Alembic для проекта SavorLink

[alembic]
# Путь к директории миграций (относительно alembic.ini)
script_location = %(here)s/backend/database/alembic

# Шаблон имени файлов миграций — с датой для удобной сортировки
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Добавляем корень проекта в sys.path — нужно для импорта моделей
prepend_sys_path = .

# Кодировка файлов миграций
output_encoding = utf-8

# URL подключения к базе данных
# Лучше хранить пароль в .env, но если оставляешь здесь — замени на реальный
sqlalchemy.url = postgresql+psycopg2://postgres:1111@localhost:5432/SavorLink

# Рекомендуется: имя базы в нижнем регистре (PostgreSQL чувствителен к регистру)
# Если база называется SavorLink — лучше переименовать в savorlink

# Разделитель путей — оставляем как есть (os — правильно для Windows)
path_separator = os


# ────────────────────────────────────────────────
# Хуки после создания миграции (очень полезно включить)
# ────────────────────────────────────────────────
[post_write_hooks]
# Форматирование миграций с помощью ruff (быстрее и современнее black)
; hooks = ruff
ruff.type = exec
ruff.executable = %(here)s/.venv/Scripts/ruff.exe   # Windows — Scripts, не bin
ruff.options = format REVISION_SCRIPT_FILENAME

# Альтернатива black (если предпочитаешь black)
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = --line-length 100 REVISION_SCRIPT_FILENAME


# ────────────────────────────────────────────────
# Логирование — уровень INFO для отладки миграций
# ────────────────────────────────────────────────
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = INFO                
handlers =
qualname = sqlalchemy

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S