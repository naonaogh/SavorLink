services:
  postgres:
    image: postgres:16-alpine
    container_name: savorlink-postgres-prod
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1111"
      POSTGRES_DB: SavorLink
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d SavorLink"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: savorlink-backend-prod
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8002
      BACKEND_RELOAD: "false"
      BACKEND_LOG_LEVEL: info
      DATABASE_URL: postgresql+asyncpg://postgres:1111@postgres:5432/SavorLink
      AUTH_TOKEN_SECRET: change-me-in-production
      AUTH_TOKEN_TTL_SECONDS: 604800
    ports:
      - "8002:8002"
    command: sh -c "alembic -c alembic.ini upgrade head && python -m backend.main"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: savorlink-frontend-prod
    environment:
      VITE_API_BASE_URL: http://localhost:8002
    ports:
      - "5173:5173"
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    depends_on:
      - backend

volumes:
  postgres_data:
