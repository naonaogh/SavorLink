services:
  postgres:
    image: postgres:16-alpine
    container_name: savorlink-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1111"
      POSTGRES_DB: SavorLink
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-SavorLink}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: savorlink-backend
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8002
      BACKEND_RELOAD: "true"
      BACKEND_LOG_LEVEL: info
      DATABASE_URL: postgresql+asyncpg://postgres:1111@postgres:5432/SavorLink
      AUTH_TOKEN_SECRET: change-me-in-production
      AUTH_TOKEN_TTL_SECONDS: 604800
    ports:
      - "8082:8002"
    volumes:
      - ./:/app
    command: sh -c "alembic -c alembic.ini upgrade head && python -m backend.main"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: savorlink-frontend
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:8082
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
